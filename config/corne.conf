# Corne Choc v2.5 (Keebmaker) on nice!nano v2 — ZMK config.
# See README.md for what each block does and the battery trade-offs.

# --- RGB underglow (the per-layer colour feature) ---------------------------
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
# nice!nano gates LED VCC through an external-power GPIO; tie RGB on/off to it
# so the LEDs actually lose power when toggled off (saves battery).
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
# Boot on the base layer = LEDs off. The &l1/&l2/&l3 macros turn them on with a
# colour; &l0 turns them back off.
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

# Colour the lower layer (&l1) uses, in case the underglow ever starts on.
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=225
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=60
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0

# --- Power management --------------------------------------------------------
# Two distinct states:
#   Idle (CONFIG_ZMK_IDLE_TIMEOUT)            — light: LEDs/OLED off, BLE stays
#                                               connected, instant wake. 30 s.
#   Deep sleep (CONFIG_ZMK_IDLE_SLEEP_TIMEOUT,
#               needs CONFIG_ZMK_SLEEP)       — deep: BLE disconnects, ~20 uA,
#                                               brief reconnect on wake. 5 min.
# Deep sleep must be >= idle.
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# --- OLED screens ------------------------------------------------------------
# The Corne's two 128x32 SSD1306 OLEDs. The standard corne shield already
# declares the panels; this flag turns on ZMK's built-in status screen
# (active layer, battery %, BT profile, output, WPM). This is why the displays
# went dark after your generic Vial flash — that build had no OLED code.
CONFIG_ZMK_DISPLAY=y
# Blank the screen when the board idles, then wake it on the next keypress —
# the OLED is a real battery cost on a wireless split.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
# Fancier screens (bongo cat, vertical widgets, custom art) come from a
# third-party module, not core ZMK. See README "Displays" for the menu and the
# RAM/battery trade-offs before enabling one.
